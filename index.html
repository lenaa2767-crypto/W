<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>وصال 🌸 - رحلة الصحة مع د. ميرنا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #fb923c; --amber: #fbbf24; --rose: #fb7185;
  --bg: #130a04; --card: #1e100a; --card2: #241308;
  --border: #4a2010; --text: #fff7ed; --sub: #c4a882; --muted: #7a5030;
}
body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; direction: rtl; min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
#content { flex: 1; overflow-y: auto; padding: 14px 14px 95px; transition: opacity 0.15s; }
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; background: #100804;
  border-top: 1px solid #4a2010; display: flex; z-index: 50;
}
.nav-btn {
  flex: 1; padding: 10px 4px 6px; background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 10px; font-weight: 600; border-top: 2px solid transparent;
  transition: all 0.2s; font-family: 'Cairo', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.nav-btn.active { color: var(--orange); border-top-color: var(--orange); font-weight: 800; }
.nav-btn .ni { font-size: 20px; }
.card {
  background: var(--card); border-radius: 16px; padding: 16px;
  margin-bottom: 12px; border: 1px solid var(--border);
}
.hero {
  background: linear-gradient(135deg,#3d0f00,#7c2d12,#92400e);
  border-radius: 20px; padding: 18px; margin-bottom: 14px; position: relative; overflow: hidden;
}
.hb1 { position:absolute;top:-20px;left:-20px;width:110px;height:110px;background:#fb923c12;border-radius:50%; }
.hb2 { position:absolute;bottom:-25px;right:-10px;width:75px;height:75px;background:#fbbf2410;border-radius:50%; }
.btn-orange {
  width:100%;background:linear-gradient(135deg,#c2410c,#ea580c);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #fb923c30; margin-bottom:10px;
}
.btn-amber {
  width:100%;background:linear-gradient(135deg,#92400e,#d97706);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #fbbf2430; margin-bottom:10px;
}
.btn-wa {
  width:100%;background:linear-gradient(135deg,#065f46,#16a34a);border:none;border-radius:14px;
  padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  box-shadow:0 4px 18px #22c55e30; margin-bottom:10px; text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.progress-ring { position:relative;flex-shrink:0; }
.progress-ring svg { transform:rotate(-90deg); }
.progress-ring .rl { position:absolute;inset:0;display:flex;align-items:center;justify-content:center; }
.modal-overlay {
  position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px;
}
.modal-box { background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:320px;border:1px solid var(--border); }
.modal-title { font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center; }
.modal-input {
  width:100%;background:#2d1208;border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:18px;font-family:'Cairo',sans-serif;
  text-align:center;outline:none;margin-bottom:12px;
}
.modal-btns { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.btn-cancel { padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-family:'Cairo',sans-serif; }
.btn-save { padding:12px;border-radius:10px;border:none;background:var(--orange);color:#fff;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif; }
.share-modal-overlay {
  position:fixed;inset:0;background:#000000dd;display:flex;align-items:flex-end;
  justify-content:center;z-index:200;
}
.share-modal-box {
  background:#100804;border-radius:24px 24px 0 0;padding:22px;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border-top:1px solid var(--border);
}
.share-report {
  background:var(--card);border-radius:14px;padding:14px;font-size:13px;color:#fff7ed;
  line-height:1.9;white-space:pre-wrap;direction:rtl;text-align:right;
  font-family:'Cairo',sans-serif;margin-bottom:14px;border:1px solid #fb923c20;
}
.toast {
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--orange);color:#fff;padding:10px 24px;border-radius:50px;
  font-weight:700;font-size:14px;font-family:'Cairo',sans-serif;z-index:300;
  box-shadow:0 4px 20px #fb923c50;opacity:0;transition:opacity 0.3s;
}
.toast.show { opacity:1; }
.week-title {
  background:linear-gradient(135deg,#3d0f00,#7c2d12);
  border-radius:12px;padding:10px 14px;margin-bottom:10px;
  font-size:14px;font-weight:800;color:#fed7aa;
  display:flex;align-items:center;gap:8px;
}
.day-card { background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden; }
.day-header {
  width:100%;background:none;border:none;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;font-family:'Cairo',sans-serif;
}
.meal-row { padding:10px 16px;border-bottom:1px solid #2d1208; }
.meal-label { font-size:11px;font-weight:700;margin-bottom:4px; }
.meal-items { font-size:13px;color:var(--sub);line-height:1.6; }
.meal-item { display:flex;align-items:center;gap:6px;padding:2px 0; }
.done-btn {
  width:100%;margin-top:12px;padding:11px;border-radius:12px;border:2px solid;
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;
  transition:all 0.2s;
}
.done-btn.undone { background:transparent;border-color:var(--border);color:var(--muted); }
.done-btn.done { background:linear-gradient(135deg,#166534,#15803d);border-color:#22c55e;color:#fff; }
.check-item {
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid #2d1208;cursor:pointer;transition:background 0.2s;
}
.check-item:active { background:#2d1208; }
.check-circle {
  width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;transition:all 0.2s;
}
.check-circle.done { background:var(--orange);border-color:var(--orange); }
.check-label { font-size:14px;color:var(--sub); }
.check-label.done { color:#fff7ed;font-weight:600; }
.water-grid { display:flex;flex-wrap:wrap;gap:8px;justify-content:center; }
.water-cup {
  width:38px;height:52px;border-radius:6px;border:none;cursor:pointer;
  font-size:20px;transition:all 0.2s;background:var(--border);
}
.water-cup.filled { background:linear-gradient(180deg,#fdba74,#f97316);transform:scale(1.05);box-shadow:0 0 10px #fb923c40; }
.mot-card {
  background:linear-gradient(135deg,#431407,#9a3412);
  border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;
  border:1px solid #fb923c40;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.3s ease forwards; }
.hidden { display:none !important; }
.snack-tag {
  display:inline-block;background:#2d1208;border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--sub);margin:2px;
}
.grid2 { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="home" onclick="switchTab('home')"><span class="ni">🏠</span>الرئيسية</button>
    <button class="nav-btn" data-tab="plan" onclick="switchTab('plan')"><span class="ni">📋</span>خطتي</button>
    <button class="nav-btn" data-tab="exercise" onclick="switchTab('exercise')"><span class="ni">🏃‍♀️</span>رياضة</button>
    <button class="nav-btn" data-tab="progress" onclick="switchTab('progress')"><span class="ni">📊</span>تقدمي</button>
  </nav>
</div>

<!-- Weight Modal -->
<div id="weightModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">⚖️ سجّلي وزنك</div>
    <input type="number" id="weightInput" placeholder="مثال: 73.5" class="modal-input" step="0.1">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeWeightModal()">إلغاء</button>
      <button class="btn-save" onclick="logWeight()">حفظ 🧡</button>
    </div>
  </div>
</div>

<!-- Measure Modal -->
<div id="measureModal" class="modal-overlay hidden" style="overflow-y:auto;align-items:flex-start;">
  <div class="modal-box" style="margin-top:20px;max-width:360px;">
    <div class="modal-title">📏 القياسات الأسبوعية</div>
    <div id="measureFields"></div>
    <div class="modal-btns" style="margin-top:14px;">
      <button class="btn-cancel" onclick="closeMeasureModal()">إلغاء</button>
      <button class="btn-save" style="background:var(--amber);color:#1c0f00;" onclick="logMeasurement()">حفظ ✓</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div id="shareModal" class="share-modal-overlay hidden" onclick="handleShareOverlay(event)">
  <div class="share-modal-box">
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:22px;margin-bottom:4px;">🧡 إنجازاتك اليوم</div>
      <div style="font-size:12px;color:var(--muted);">جاهزة للإرسال للدكتورة ميرنا</div>
    </div>
    <div id="shareReport" class="share-report"></div>
    <a id="whatsappBtn" class="btn-wa" target="_blank">💬 إرسال للدكتورة ميرنا واتساب</a>
    <button onclick="copyReport()" class="btn-orange">📋 نسخ النص</button>
    <button onclick="closeShareModal()" style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;">إغلاق</button>
  </div>
</div>

<div id="toast" class="toast"></div>

function todayKey() { return new Date().toISOString().slice(0,10); }
function loadData() { try { return JSON.parse(localStorage.getItem('wisal_v1')||'{}'); } catch{return{};} }
function saveData(d) { try { localStorage.setItem('wisal_v1',JSON.stringify(d)); } catch{} }
let D = loadData();

function getToday() {
  if(!D[todayKey()]) D[todayKey()]={};
  return D[todayKey()];
}
function updateToday(patch) {
  D[todayKey()]={...getToday(),...patch};
  saveData(D); render();
}
function getStreak() {
  let s=0, d=new Date();
  while(true){ const k=d.toISOString().slice(0,10); if(D[k]?.completed){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}
function calcBMI(w,h){ return (w/((h/100)**2)).toFixed(1); }

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const c=document.getElementById('content');
  c.style.opacity='0';
  setTimeout(()=>{ render(); c.style.opacity='1'; },150);
}

function render() {
  const c=document.getElementById('content');
  switch(currentTab){
    case 'home': c.innerHTML=renderHome(); break;
    case 'plan': c.innerHTML=renderPlan(); break;
    case 'exercise': c.innerHTML=renderExercise(); break;
    case 'progress': c.innerHTML=renderProgress(); break;
  }
}

function ring(pct,size=72,stroke=7,color='#fb923c',label='') {
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return `<div class="progress-ring" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#4a2010" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}"
        stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
        stroke-linecap="round" style="transition:stroke-dashoffset 0.6s;transform:rotate(-90deg);transform-origin:center;"/>
    </svg>
    <div class="rl" style="font-size:12px;font-weight:800;color:${color};">${label}</div>
  </div>`;
}

function toggleCheck(key) {
  const t=getToday();
  if(key==='water') return;
  updateToday({[key]:!t[key]});
  checkCompletion();
}

function toggleMealDone(key, label) {
  const t=getToday();
  updateToday({[key]:!t[key]});
  if(!t[key]) showToast('✅ '+label+' — تم! 🧡','#fb923c');
  checkCompletion();
}

function toggleEx(name) {
  const t=getToday();
  const arr=Array.isArray(t.exercise)?t.exercise:[];
  const next=arr.includes(name)?arr.filter(x=>x!==name):[...arr,name];
  updateToday({exercise:next});
}

function setWater(val) { updateToday({water:val}); checkCompletion(); }
function setExNote(val) { D[todayKey()]={...getToday(),exNote:val}; saveData(D); }
function toggleDay(n) { openDays[n]=!openDays[n]; render(); }
function nextMot() { motIdx=(motIdx+1)%MOTIVATIONS.length; render(); }

function checkCompletion() {
  const t=getToday();
  const w=t.water||0;
  if(t.breakfast&&t.lunch&&t.dinner&&w>=WATER_GOAL&&!t.completed){
    D[todayKey()]={...t,completed:true}; saveData(D);
  }
}

}
function closeShareModal() { document.getElementById('shareModal').classList.add('hidden'); }
function handleShareOverlay(e) { if(e.target.id==='shareModal') closeShareModal(); }
function copyReport() {
  const text=document.getElementById('shareReport').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast('✅ تم النسخ! 🧡','#fb923c'));
  else { const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ تم النسخ!','#fb923c'); }
}

function showToast(msg,color) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color||'#fb923c';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════
// WEIGHT & MEASURE MODALS
// ═══════════════════════════════════════════════════

function openWeightModal() { document.getElementById('weightModal').classList.remove('hidden'); }
function closeWeightModal() { document.getElementById('weightModal').classList.add('hidden'); document.getElementById('weightInput').value=''; }
function logWeight() {
  const w=parseFloat(document.getElementById('weightInput').value);
  if(!w||w<30||w>300) return;
  const ws=D._weights||[];
  D._weights=[...ws,{date:todayKey(),weight:w}].slice(-30);
  saveData(D); closeWeightModal(); render();
}

function openMeasureModal() {
  const fields=[['weight','الوزن (كغ)','74'],['waist','محيط الخصر (سم)',''],['hip','محيط الورك (سم)',''],['chest','محيط الصدر (سم)',''],['arm','محيط الذراع (سم)',''],['thigh','محيط الفخذ (سم)','']];
  document.getElementById('measureFields').innerHTML=fields.map(([k,l,p])=>`<div style="margin-bottom:10px;"><div style="font-size:12px;color:var(--muted);margin-bottom:4px;text-align:right;">${l}</div><input type="number" id="m_${k}" placeholder="${p}" style="width:100%;background:#2d1208;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;text-align:right;outline:none;" step="0.1"></div>`).join('');
  document.getElementById('measureModal').classList.remove('hidden');
}
function closeMeasureModal() { document.getElementById('measureModal').classList.add('hidden'); }
function logMeasurement() {
  const keys=['weight','waist','hip','chest','arm','thigh'];
  const entry={date:todayKey()};
  keys.forEach(k=>{const el=document.getElementById('m_'+k);if(el&&el.value)entry[k]=el.value;});
  const ms=D._measurements||[];
  D._measurements=[...ms,entry].slice(-20);
  saveData(D); closeMeasureModal(); render();
}

setInterval(()=>{ tipIdx=(tipIdx+1)%TIPS.length; if(currentTab==='home') render(); },9000);
render();
